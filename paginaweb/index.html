<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Editor de Textos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0f1117;
            --surface: #eeda78;
            --surface2: #cbcee1;
            --accent: #6c63ff;
            --accent2: #ff6584;
            --text: #0c2de4;
            --text-muted: #7b7f9e;
            --border: #2e3250;
            --success: #00e676;
            --radius: 12px;
            --header-h: 48px;
            --toolbar-h: 48px;
            --topbar-h: 52px;
            --footer-h: 52px;
            --status-h: 36px;
            --editor-h: calc(100dvh * 0.90 - var(--header-h) - var(--topbar-h) - var(--toolbar-h) - var(--footer-h));
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Nunito', sans-serif;
            color: var(--text);
        }

        /* ── LAYOUT PRINCIPAL ── */
        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            background-color: var(--bg);
        }

        /* ── CABECERA ── */
        .app-header {
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            flex-shrink: 0;
        }

        .app-header h1 {
            font-size: 1.05rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }

        .char-count {
            font-size: 0.72rem;
            color: var(--text-muted);
            background: var(--surface2);
            padding: 4px 8px;
            border-radius: 20px;
        }

        /* ── TOP BAR (selector + nuevo) ── */
        .top-bar {
            height: var(--topbar-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
            flex-shrink: 0;
        }

        .top-bar select {
            flex: 1;
            height: 36px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 0.88rem;
            padding: 0 10px;
            -webkit-appearance: none;
            appearance: none;
        }

        .top-bar select:focus { outline: none; border-color: var(--accent); }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s, border-color 0.15s;
        }

        .icon-btn:active { background: var(--accent); border-color: var(--accent); }
        .icon-btn.accent { background: var(--accent); border-color: var(--accent); }
        .icon-btn.accent:active { opacity: 0.8; }
        .icon-btn.danger { background: #3a1a2a; border-color: var(--accent2); color: var(--accent2); }
        .icon-btn.danger:active { background: var(--accent2); color: white; }

        /* ── TOOLBAR DE FORMATO ── */
        .toolbar {
            height: var(--toolbar-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 8px;
            overflow-x: auto;
            flex-shrink: 0;
            scrollbar-width: none;
        }

        .toolbar::-webkit-scrollbar { display: none; }

        .tb-btn {
            min-width: 36px;
            height: 36px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.15s;
            padding: 0 8px;
        }

        .tb-btn:active, .tb-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .tb-sep {
            width: 1px;
            height: 28px;
            background: var(--border);
            flex-shrink: 0;
            margin: 0 4px;
        }

        .tb-select {
            height: 36px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 0.8rem;
            padding: 0 6px;
            flex-shrink: 0;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .tb-select:focus { outline: none; border-color: var(--accent); }

        /* ── EDITOR ÁREA ── */
        .editor-wrap {
            height: var(--editor-h);
            max-height: var(--editor-h);
            flex: none;
            overflow: hidden;
            position: relative;
            background: var(--surface);
        }

        #textContent {
            width: 100%;
            height: 100%;
            padding: 16px;
            border: none;
            outline: none;
            font-family: 'Nunito', sans-serif;
            font-size: 1.2rem;
            line-height: 1.65;
            background: var(--surface);
            color: var(--text);
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        #textContent:empty::before {
            content: 'Empieza a escribir...';
            color: var(--text-muted);
            pointer-events: none;
        }

        #textContent table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        #textContent th, #textContent td {
            border: 1px solid var(--border);
            padding: 8px;
            text-align: left;
            font-size: 13px;
            color: var(--text);
        }
        #textContent th { background: var(--surface2); }
        #textContent tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
        #textContent a { color: var(--accent); }

        /* ── BARRA DE VOZ (aparece cuando graba) ── */
        .voice-bar {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 6px 14px;
            background: linear-gradient(135deg, #3a1a3a, #1a1a3a);
            border-top: 1px solid var(--accent2);
            flex-shrink: 0;
            font-size: 0.82rem;
            color: var(--accent2);
            animation: pulse-bar 1.2s ease-in-out infinite;
        }

        .voice-bar.active { display: flex; }

        @keyframes pulse-bar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.65; }
        }

        .voice-dot {
            width: 10px; height: 10px;
            background: var(--accent2);
            border-radius: 50%;
            animation: pulse-dot 0.8s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }

        /* ── FOOTER BOTONES ── */
        .footer-bar {
            height: var(--footer-h);
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 6px;
            flex-shrink: 0;
        }

        .foot-btn {
            flex: 1;
            height: 40px;
            margin: 0 20px;
            border: none;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            transition: opacity 0.15s;
            color: rgb(12, 12, 12);
        }

        .foot-btn:active { opacity: 0.75; transform: scale(0.96); }
        .foot-btn span.ico { font-size: 1rem; line-height: 1; }
        .foot-btn span.lbl { font-size: 0.6rem; line-height: 1; }

        .foot-btn.save     { background: linear-gradient(135deg, #00b09b, #00e676); }
        .foot-btn.json     { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .foot-btn.download { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
        .foot-btn.load     { background: linear-gradient(135deg, #f7971e, #ffd200); }
        .foot-btn.del      { background: linear-gradient(135deg, #ff1744, #ff5252); }

        /* ── STATUS ── */
        .status-bar {
            display: none;
            position: fixed;
            bottom: calc(var(--footer-h) + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #1e2235ee;
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 0.8rem;
            color: var(--success);
            white-space: nowrap;
            z-index: 500;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(8px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ── MODALES ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.open { display: flex; }

        .modal-sheet {
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 500px;
            padding: 20px 20px 30px;
            border-top: 1px solid var(--border);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }

        .modal-handle {
            width: 40px; height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 18px;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            height: 42px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            padding: 0 12px;
            -webkit-appearance: none;
        }

        .form-group input:focus { outline: none; border-color: var(--accent); }

        .form-group input[type="checkbox"] {
            width: 18px; height: 18px;
            accent-color: var(--accent);
            margin-right: 8px;
        }

        .form-group .check-row {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .m-btn {
            flex: 1;
            height: 44px;
            border: none;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .m-btn:active { opacity: 0.75; }
        .m-btn.cancel { background: var(--surface2); color: var(--text-muted); }
        .m-btn.confirm { background: var(--accent); color: white; }

        .name-error {
            font-size: 0.75rem;
            color: var(--accent2);
            margin-top: 4px;
            display: none;
        }

        /* ── VOLVER ── */
        .boton-volver1 {
            display: none; /* se puede activar si se necesita */
        }
    </style>
</head>
<body>
<div class="app">

    <!-- CABECERA -->
    <div class="app-header">
        <div style="display:flex;align-items:center;gap:8px;">
            <h1>📝 Editor de Textos <img src="icon.png" alt="icono" style="height:26px;width:26px;object-fit:contain;border-radius:6px;vertical-align:middle;margin-left:6px;"></h1>
            <img id="headerImg" src="" alt=""
                 style="height:28px;width:28px;object-fit:contain;border-radius:6px;display:none;">
        </div>
        <span class="char-count" id="charCount">0 car.</span>
    </div>

    <!-- TOP BAR -->
    <div class="top-bar">
        <select id="textSelector" onchange="loadSelectedText()">
            <option value="">-- Sin documentos --</option>
        </select>
        <button class="icon-btn accent" onclick="openNewEntryModal()" title="Nuevo">➕</button>
        <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()" title="Voz">🎙️</button>
        <button class="icon-btn danger" onclick="deleteCurrentEntry()" title="Eliminar">🗑️</button>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <button class="tb-btn" onclick="fmt('bold')"><b>B</b></button>
        <button class="tb-btn" onclick="fmt('italic')"><em>I</em></button>
        <button class="tb-btn" onclick="fmt('underline')"><u>U</u></button>
        <button class="tb-btn" onclick="fmt('strikeThrough')"><s>S</s></button>
        <div class="tb-sep"></div>
        <select class="tb-select" onchange="fmt('formatBlock', this.value)">
            <option value="p">Párrafo</option>
            <option value="h1">H1</option>
            <option value="h2">H2</option>
            <option value="h3">H3</option>
            <option value="pre">Código</option>
        </select>
        <select class="tb-select" onchange="fmt('fontSize', this.value)">
            <option value="1">XS</option>
            <option value="2">S</option>
            <option value="3" selected>M</option>
            <option value="4">L</option>
            <option value="5">XL</option>
        </select>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="fmt('justifyLeft')">⇤</button>
        <button class="tb-btn" onclick="fmt('justifyCenter')">≡</button>
        <button class="tb-btn" onclick="fmt('justifyRight')">⇥</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="fmt('insertUnorderedList')">•</button>
        <button class="tb-btn" onclick="fmt('insertOrderedList')">1.</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onclick="fmt('undo')">↶</button>
        <button class="tb-btn" onclick="fmt('redo')">↷</button>
        <button class="tb-btn" onclick="fmt('removeFormat')" title="Limpiar formato">✕</button>
    </div>

    <!-- BARRA DE VOZ -->
    <div class="voice-bar" id="voiceBar">
        <div class="voice-dot"></div>
        <span>Escuchando... (toca 🎙️ para parar)</span>
    </div>

    <!-- EDITOR -->
    <div class="editor-wrap">
        <div id="textContent" contenteditable="true"
             oninput="updateCharCount(); markAsModified()">
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer-bar">
        <button class="foot-btn save" onclick="saveCurrentText()">
            <span class="ico">💾</span><span class="lbl">Guardar</span>
        </button>
        <button class="foot-btn json" onclick="exportShare()">
            <span class="ico">📤</span><span class="lbl">Compartir</span>
        </button>
        <button class="foot-btn download" onclick="exportDownload()">
            <span class="ico">⬇️</span><span class="lbl">Descargas</span>
        </button>
        <button class="foot-btn load" onclick="loadData()">
            <span class="ico">📂</span><span class="lbl">Imp. JSON</span>
        </button>
    </div>

</div><!-- /app -->

<!-- STATUS -->
<div id="statusBar" class="status-bar"></div>

<!-- MODAL: Nuevo documento -->
<div id="newEntryModal" class="modal">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">Nuevo Documento</div>
        <div class="form-group">
            <label>Nombre del documento</label>
            <input type="text" id="entryName" placeholder="Ej: Mi nota, Receta..." oninput="validateEntryName()">
            <div class="name-error" id="nameError"></div>
        </div>
        <div class="modal-actions">
            <button class="m-btn cancel" onclick="closeModal()">Cancelar</button>
            <button class="m-btn confirm" onclick="createNewEntry()">Crear</button>
        </div>
    </div>
</div>

<script>
    // ─── ESTADO ───
    let textsData = {};
    let currentSelected = null;
    let isModified = false;
    let recognition = null;
    let isListening = false;

    // ─── INIT ───
    document.addEventListener('DOMContentLoaded', () => {
        loadFromLocalStorage();
        updateSelector();
        document.addEventListener('keydown', handleShortcuts);
        document.getElementById('textContent').addEventListener('paste', () => {
            setTimeout(markAsModified, 50);
        });
        // Cerrar modal al tocar fondo
        document.getElementById('newEntryModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    });

    // ─── FORMATO ───
    function fmt(command, value = null) {
        const editor = document.getElementById('textContent');
        document.execCommand(command, false, value);
        editor.focus();
        markAsModified();
    }

    // ─── ATAJOS ───
    function handleShortcuts(e) {
        if (e.ctrlKey || e.metaKey) {
            if (e.key === 'b') { e.preventDefault(); fmt('bold'); }
            if (e.key === 'i') { e.preventDefault(); fmt('italic'); }
            if (e.key === 'u') { e.preventDefault(); fmt('underline'); }
            if (e.key === 's') { e.preventDefault(); saveCurrentText(); }
        }
    }

    // ─── VOZ ───
    async function toggleVoice() {
        if (isListening) {
            await stopVoice();
            return;
        }

        // ── Capacitor SpeechRecognition (APK Android) ──
        if (window.Capacitor && window.Capacitor.isNativePlatform()) {
            await startVoiceCapacitor();
        } else {
            // ── Fallback: Web Speech API (navegador) ──
            startVoiceWeb();
        }
    }

    // ── Plugin Capacitor ──
    async function startVoiceCapacitor() {
        const { SpeechRecognition } = Capacitor.Plugins;

        if (!SpeechRecognition) {
            showStatus('⚠️ Plugin de voz no disponible');
            return;
        }

        try {
            const { speechRecognition } = await SpeechRecognition.requestPermissions();
            if (speechRecognition !== 'granted') {
                showStatus('⚠️ Permiso de micrófono denegado');
                return;
            }

            // Limpiar listeners anteriores siempre antes de empezar
            await SpeechRecognition.removeAllListeners();

            let lastPartial = '';

            // partialResults recibe TANTO los parciales como el resultado FINAL
            // (cuando partialResults=true, onResults también notifica aquí)
            SpeechRecognition.addListener('partialResults', (data) => {
                if (data.matches && data.matches.length > 0) {
                    lastPartial = data.matches[0];
                    document.querySelector('.voice-bar span').textContent = '🎙️ ' + lastPartial;
                }
            });

            // listeningState="stopped" = fin de escucha → esperar resultado final y insertar
            SpeechRecognition.addListener('listeningState', (state) => {
                if (state.status === 'stopped') {
                    // Esperamos 400ms para que onResults entregue la palabra final
                    setTimeout(() => {
                        if (lastPartial.trim()) {
                            insertTranscript(lastPartial.trim());
                        }
                        lastPartial = '';
                        setVoiceStopped();
                    }, 400);
                }
            });

            await SpeechRecognition.start({
                language: 'es-ES',
                maxResults: 1,
                partialResults: true,
                popup: false
            });

            isListening = true;
            document.getElementById('voiceBar').classList.add('active');
            document.querySelector('.voice-bar span').textContent = 'Escuchando...';
            document.getElementById('voiceBtn').style.background = '#ff6584';
            document.getElementById('voiceBtn').style.borderColor = '#ff6584';
            showStatus('🎙️ Escuchando...');

        } catch(e) {
            showStatus('⚠️ Error: ' + (e.message || e));
            setVoiceStopped();
        }
    }

    // ── Web Speech API (fallback navegador) ──
    function startVoiceWeb() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { showStatus('⚠️ Voz no soportada en este navegador'); return; }

        recognition = new SR();
        recognition.lang = 'es-ES';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onstart = () => {
            isListening = true;
            document.getElementById('voiceBar').classList.add('active');
            document.querySelector('.voice-bar span').textContent = 'Escuchando...';
            document.getElementById('voiceBtn').style.background = '#ff6584';
            document.getElementById('voiceBtn').style.borderColor = '#ff6584';
            showStatus('🎙️ Escuchando...');
        };

        recognition.onresult = (event) => {
            let final = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                if (event.results[i].isFinal) {
                    final += event.results[i][0].transcript;
                } else {
                    document.querySelector('.voice-bar span').textContent =
                        '🎙️ ' + event.results[i][0].transcript;
                }
            }
            if (final) insertTranscript(final);
        };

        recognition.onerror = (e) => {
            showStatus('⚠️ Error de voz: ' + e.error);
            setVoiceStopped();
        };

        recognition.onend = () => { setVoiceStopped(); };
        recognition.start();
    }

    // ── Insertar texto transcrito en el editor ──
    function insertTranscript(text) {
        const editor = document.getElementById('textContent');
        editor.focus();
        document.execCommand('insertText', false, text + ' ');
        updateCharCount();
        markAsModified();
    }

    // ── Parar voz ──
    async function stopVoice() {
        if (window.Capacitor && window.Capacitor.isNativePlatform()) {
            try {
                const { SpeechRecognition } = Capacitor.Plugins;
                await SpeechRecognition.stop();
            } catch(e) {}
        } else {
            if (recognition) { try { recognition.stop(); } catch(e) {} }
        }
        setVoiceStopped();
    }

    function setVoiceStopped() {
        isListening = false;
        document.getElementById('voiceBar').classList.remove('active');
        document.querySelector('.voice-bar span').textContent = 'Escuchando...';
        const btn = document.getElementById('voiceBtn');
        btn.style.background = '';
        btn.style.borderColor = '';
    }

    // ─── CHARS ───
    function updateCharCount() {
        const text = document.getElementById('textContent').innerText || '';
        const n = text.trim() === '' ? 0 : text.length;
        document.getElementById('charCount').textContent = n + ' car.';
    }

    // ─── MODAL NUEVO DOC ───
    function openNewEntryModal() {
        document.getElementById('entryName').value = '';
        document.getElementById('nameError').style.display = 'none';
        document.getElementById('newEntryModal').classList.add('open');
        setTimeout(() => document.getElementById('entryName').focus(), 300);
    }

    function closeModal() {
        document.getElementById('newEntryModal').classList.remove('open');
    }

    function validateEntryName() {
        const name = document.getElementById('entryName').value.trim();
        const err = document.getElementById('nameError');
        if (textsData.hasOwnProperty(name)) {
            err.textContent = '⚠️ Ya existe un documento con este nombre';
            err.style.display = 'block';
            return false;
        }
        if (name.length > 0 && name.length < 2) {
            err.textContent = '⚠️ Mínimo 2 caracteres';
            err.style.display = 'block';
            return false;
        }
        err.style.display = 'none';
        return true;
    }

    function createNewEntry() {
        const name = document.getElementById('entryName').value.trim();
        if (!name) { showStatus('⚠️ Escribe un nombre'); return; }
        if (!validateEntryName()) return;

        textsData[name] = '';
        saveToLocalStorage();
        updateSelector();
        document.getElementById('textSelector').value = name;
        closeModal();
        loadSelectedText();
        showStatus('✅ Documento "' + name + '" creado');
    }

    // ─── SELECTOR ───
    function updateSelector() {
        const sel = document.getElementById('textSelector');
        sel.innerHTML = '';
        if (Object.keys(textsData).length === 0) {
            sel.innerHTML = '';
            currentSelected = null;
            return;
        }
        // Opción vacía inicial cuando no hay selección activa
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = '-- Selecciona --';
        placeholder.disabled = true;
        if (!currentSelected || !textsData[currentSelected]) placeholder.selected = true;
        sel.appendChild(placeholder);

        Object.keys(textsData).sort().forEach(key => {
            const o = document.createElement('option');
            o.value = key;
            o.textContent = key;
            sel.appendChild(o);
        });
        if (currentSelected && textsData[currentSelected]) sel.value = currentSelected;
    }

    function loadSelectedText() {
        if (isModified && currentSelected) {
            if (confirm('¿Guardar cambios antes de cambiar?')) saveCurrentText();
        }
        const sel = document.getElementById('textSelector');
        const editor = document.getElementById('textContent');
        const val = sel.value;
        if (val && textsData[val] !== undefined) {
            editor.innerHTML = textsData[val] || '<p></p>';
            currentSelected = val;
            isModified = false;
            updateCharCount();
            showStatus('📄 "' + val + '" cargado');
        } else {
            editor.innerHTML = '';
            currentSelected = null;
            isModified = false;
            updateCharCount();
        }
    }

    function markAsModified() { isModified = true; }

    // ─── GUARDAR / CARGAR ───
    function saveCurrentText() {
        if (!currentSelected) { showStatus('⚠️ Sin documento seleccionado'); return; }
        textsData[currentSelected] = document.getElementById('textContent').innerHTML;
        saveToLocalStorage();
        isModified = false;
        showStatus('✅ "' + currentSelected + '" guardado');
    }

    function saveToLocalStorage() {
        localStorage.setItem('textsData', JSON.stringify(textsData));
    }

    function loadFromLocalStorage() {
        try {
            const d = localStorage.getItem('textsData');
            if (d) textsData = JSON.parse(d);
        } catch(e) {}
    }

    // ─── Nombre de archivo con fecha ───
    function jsonFileName() {
        return 'docs_' + new Date().toISOString().slice(0,10) + '.json';
    }

    function getJsonStr() {
        // 1. Guardar el documento actual en memoria y localStorage
        if (currentSelected) {
            textsData[currentSelected] = document.getElementById('textContent').innerHTML;
            saveToLocalStorage();
            isModified = false;
        }
        // 2. Releer desde localStorage para asegurar datos más recientes
        try {
            const fresh = localStorage.getItem('textsData');
            if (fresh) textsData = JSON.parse(fresh);
        } catch(e) {}

        return JSON.stringify(textsData, null, 2);
    }

    // ─── Detectar si estamos en Capacitor nativo ───
    function isCapacitor() {
        return window.Capacitor && window.Capacitor.isNativePlatform();
    }

    // ─── COMPARTIR (menú nativo Android) ───
    async function exportShare() {
        if (Object.keys(textsData).length === 0) { showStatus('⚠️ Sin datos'); return; }
        const str = getJsonStr();
        const fileName = jsonFileName();
        const ndocs = Object.keys(textsData).length;
        showStatus('📤 Exportando ' + ndocs + ' documento(s)...');

        if (isCapacitor()) {
            try {
                const { Filesystem, Share } = Capacitor.Plugins;

                // Escribir archivo en caché temporal
                const result = await Filesystem.writeFile({
                    path: fileName,
                    data: str,
                    directory: 'CACHE',
                    encoding: 'utf8'
                });

                // Abrir menú nativo de compartir
                await Share.share({
                    title: 'Exportar documentos',
                    text: 'Backup de documentos',
                    url: result.uri,
                    dialogTitle: 'Compartir JSON'
                });

                showStatus('📤 Compartido correctamente');
            } catch(e) {
                console.warn('Share error:', e);
                showStatus('⚠️ Error al compartir: ' + (e.message || e));
            }
            return;
        }

        // Fallback navegador: Web Share API o descarga
        const blob = new Blob([str], { type: 'application/json' });
        const file = new File([blob], fileName, { type: 'application/json' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try { await navigator.share({ files: [file], title: 'Documentos JSON' }); return; }
            catch(e) { if (e.name === 'AbortError') return; }
        }
        exportDownloadFallback(str, fileName);
    }

    // ─── GUARDAR EN DESCARGAS ───
    async function exportDownload() {
        if (Object.keys(textsData).length === 0) { showStatus('⚠️ Sin datos'); return; }
        const str = getJsonStr();
        const fileName = jsonFileName();
        const ndocs = Object.keys(textsData).length;
        showStatus('⬇️ Guardando ' + ndocs + ' documento(s)...');

        if (isCapacitor()) {
            const { Filesystem } = Capacitor.Plugins;
            // Intentar directorios en orden hasta que uno funcione
            const intentos = [
                { directory: 'EXTERNAL_STORAGE', path: 'Download/' + fileName, label: 'Descargas' },
                { directory: 'EXTERNAL_STORAGE', path: fileName,               label: 'Almacenamiento externo' },
                { directory: 'DATA',             path: fileName,               label: 'Almacenamiento interno' },
                { directory: 'CACHE',            path: fileName,               label: 'Caché (temporal)' },
            ];

            for (const intento of intentos) {
                try {
                    await Filesystem.writeFile({
                        path: intento.path,
                        data: str,
                        directory: intento.directory,
                        encoding: 'utf8',
                        recursive: true
                    });
                    showStatus('⬇️ Guardado en ' + intento.label + ': ' + fileName);
                    return;
                } catch(e) {
                    console.warn('Intento fallido (' + intento.directory + '):', e.message);
                }
            }
            showStatus('⚠️ No se pudo guardar. Usa "Compartir" en su lugar.');
            return;
        }

        // Fallback navegador
        exportDownloadFallback(str, fileName);
    }

    function exportDownloadFallback(str, fileName) {
        const uri = 'data:application/json;charset=utf-8,' + encodeURIComponent(str);
        const a = document.createElement('a');
        a.href = uri; a.download = fileName; a.click();
        showStatus('📁 JSON descargado');
    }

    function loadData() {
        if (Object.keys(textsData).length > 0)
            if (!confirm('Esto reemplazará todos los documentos. ¿Continuar?')) return;
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.json';
        input.onchange = e => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const json = JSON.parse(ev.target.result);
                    if (typeof json !== 'object' || Array.isArray(json)) throw new Error('Formato incorrecto');
                    textsData = json;
                    saveToLocalStorage();
                    updateSelector();
                    currentSelected = null; isModified = false;
                    document.getElementById('textContent').innerHTML = '';
                    updateCharCount();
                    showStatus('📂 ' + Object.keys(textsData).length + ' documentos cargados');
                } catch(err) { alert('Error: ' + err.message); }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function deleteCurrentEntry() {
        if (!currentSelected) { showStatus('⚠️ Sin documento seleccionado'); return; }
        if (!confirm('¿Eliminar "' + currentSelected + '"?')) return;
        const name = currentSelected;
        delete textsData[name];
        saveToLocalStorage();
        currentSelected = null; isModified = false;
        updateSelector();
        document.getElementById('textContent').innerHTML = '';
        updateCharCount();
        showStatus('🗑️ "' + name + '" eliminado');
    }

    // ─── STATUS ───
    function showStatus(msg) {
        const bar = document.getElementById('statusBar');
        bar.textContent = msg;
        bar.style.display = 'block';
        clearTimeout(bar._t);
        bar._t = setTimeout(() => { bar.style.display = 'none'; }, 3000);
    }
</script>
</body>
